schemaVersion: 2.2.0
metadata:
  name: dls-devspaces
  attributes:
    controller.devfile.io/editor: che-incubator/che-code/latest
variables:
  GIT_ORG: rhpds
  GIT_REPO: kai-coolstore
  GITEA_HOST: github.com

components:
  - name: che-code
    plugin:
      id: che-incubator/che-code/latest
      registryUrl: 'http://che-gateway.openshift-devspaces.svc.cluster.local:8080/plugin-registry/v3'

  - name: kai-dev-container
    container:
      image: quay.io/dbrugger946/dls-devspaces:latest
      memoryLimit: 8Gi
      mountSources: true

projects:
  - name: "{{ GIT_REPO }}"
    git:
      remotes:
        origin: "http://{{ GITEA_HOST }}/{{ GIT_ORG }}/{{ GIT_REPO }}"
      checkoutFrom:
        revision: main
