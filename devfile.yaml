schemaVersion: 2.2.0
metadata:
  name: dls-devspaces

components:
  - name: kai-dev-container
    container:
      image: quay.io/dbrugger946/dls-devspaces:latest
      memoryLimit: 8Gi
      mountSources: true
      command:
        - /checode/entrypoint-volume.
      endpoints:
        - name: che-code
          targetPort: 3100
          exposure: public
          secure: true
          protocol: https
          attributes:
            type: main
            cookiesAuthEnabled: true
            discoverable: false
            urlRewriteSupported: true
        - name: code-redirect-1
          targetPort: 13131
          exposure: public
          protocol: https
          attributes:
            discoverable: false
            urlRewriteSupported: false
        - name: code-redirect-2
          targetPort: 13132
          exposure: public
          protocol: https
          attributes:
            discoverable: false
            urlRewriteSupported: false
        - name: code-redirect-3
          targetPort: 13133
          exposure: public
          protocol: https
          attributes:
            discoverable: false
            urlRewriteSupported: false

commands:
  - id: clone-repo
    exec:
      component: kai-dev-container
      commandLine: |
        if [ ! -d "/projects/kai-coolstore" ]; then
          git clone http://${GIT_USERNAME}:${GIT_PASSWORD}@${GITEA_HOST}/${GIT_ORG}/kai-coolstore /projects/kai-coolstore
        fi
      workingDir: /projects

events:
  postStart:
    - clone-repo
