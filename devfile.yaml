schemaVersion: 2.2.0
metadata:
  name: dls-devspaces

components:
  - name: tools
    container:
      image: quay.io/dbrugger946/dls-devspaces:latest
      memoryLimit: 8Gi
      mountSources: true

commands:
  - id: clone-repo
    exec:
      component: tools
      commandLine: |
        if [ ! -d "/projects/kai-coolstore" ]; then
          git clone http://${GIT_USERNAME}:${GIT_PASSWORD}@${GITEA_HOST}/${GIT_ORG}/kai-coolstore /projects/kai-coolstore
        fi
      workingDir: /projects

events:
  postStart:
    - clone-repo
